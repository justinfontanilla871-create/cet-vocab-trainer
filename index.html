<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>四六级高频词默写器</title>
  <link rel="stylesheet" href="styles.css?v=20260608-choicefix" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CET</div>
        <div>
          <h1>高频词默写器</h1>
          <p>听音默写 · 错词复盘 · 每日打卡</p>
        </div>
      </div>

      <section class="panel compact">
        <div class="field exam-field">
          <label>考试</label>
          <div class="segmented" role="group" aria-label="考试类型">
            <button id="cet4Btn" class="segment active" data-exam="cet4" type="button">四级</button>
            <button id="cet6Btn" class="segment" data-exam="cet6" type="button">六级</button>
            <button id="commonBtn" class="segment" data-exam="common" type="button">通用</button>
          </div>
        </div>
        <div class="field">
          <label for="levelSelect">词库</label>
          <select id="levelSelect">
            <option value="cet4_pdf" data-exam="cet4">四级核心1500词</option>
            <option value="cet4_700" data-exam="cet4">四级高频700词</option>
            <option value="cet6_pdf" data-exam="cet6">六级核心1500词</option>
            <option value="cet6_1000" data-exam="cet6">六级高频1000词</option>
            <option value="cet_common_200" data-exam="common">四六级必背200词</option>
            <option value="cet_common_core_scan" data-exam="common">四六级核心800词</option>
            <option value="cet_common_gift_freq" data-exam="common">四六级高频1500词</option>
          </select>
        </div>
        <div class="field">
          <label for="modeSelect">训练模式</label>
          <select id="modeSelect">
            <option value="dictation">听音默写</option>
            <option value="cn2en">看中文默写</option>
            <option value="en2cn">看英文选义</option>
          </select>
        </div>
        <div class="field">
          <label for="dailyGoal">今日目标</label>
          <input id="dailyGoal" type="number" min="5" max="200" value="50" />
        </div>
      </section>

      <section class="panel stats-grid" aria-label="学习统计">
        <div>
          <span id="todayDone">0</span>
          <small>今日完成</small>
        </div>
        <div>
          <span id="accuracy">0%</span>
          <small>正确率</small>
        </div>
        <div>
          <span id="wrongCount">0</span>
          <small>错词</small>
        </div>
        <div>
          <span id="streak">0</span>
          <small>连续天数</small>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>今日进度</h2>
          <span id="goalLabel">0/50</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <button id="shareBtn" class="secondary-btn" type="button">生成打卡文案</button>
      </section>
    </aside>

    <main class="trainer">
      <nav class="top-tabs" aria-label="视图切换">
        <button class="tab active" data-view="practice" type="button">默写</button>
        <button class="tab" data-view="wrongbook" type="button">错词本</button>
        <button class="tab" data-view="wordlist" type="button">词库</button>
      </nav>

      <section id="practiceView" class="view active">
        <div class="practice-card">
          <div class="card-head">
            <div>
              <p id="questionType" class="eyebrow">听音默写</p>
              <h2 id="promptText">准备开始</h2>
            </div>
            <button id="speakBtn" class="icon-btn" type="button" title="播放发音" aria-label="播放发音">▶</button>
          </div>

          <div id="phonetic" class="phonetic">点击播放，听完后输入英文单词</div>

          <form id="answerForm" class="answer-form">
            <input id="answerInput" autocomplete="off" placeholder="输入英文单词" />
            <button id="submitBtn" type="submit">提交</button>
          </form>

          <div id="choices" class="choices" hidden></div>

          <div id="feedback" class="feedback" aria-live="polite"></div>

          <div class="actions">
            <button id="skipBtn" class="ghost-btn" type="button">看答案</button>
            <button id="nextBtn" class="primary-btn" type="button">下一词</button>
          </div>
        </div>

        <section class="word-detail">
          <div>
            <span>当前单词</span>
            <strong id="currentWord">-</strong>
          </div>
          <div>
            <span>中文释义</span>
            <strong id="currentMeaning">-</strong>
          </div>
          <div>
            <span>复盘</span>
            <p id="currentExample">完成一次作答后显示音标、词库和错词状态。</p>
          </div>
        </section>
      </section>

      <section id="wrongbookView" class="view">
        <div class="section-head">
          <h2 id="wrongbookTitle">四级错词本</h2>
          <button id="practiceWrongBtn" class="primary-btn" type="button">只练错词</button>
        </div>
        <div id="wrongList" class="list"></div>
      </section>

      <section id="wordlistView" class="view">
        <div class="section-head">
          <h2>高频词库</h2>
          <input id="searchInput" class="search-input" placeholder="搜索单词或中文" />
        </div>
        <div id="wordList" class="list"></div>
      </section>
    </main>
  </div>

  <dialog id="shareDialog">
    <div class="dialog-card">
      <h2>打卡文案</h2>
      <textarea id="shareText" rows="7" readonly></textarea>
      <div class="dialog-actions">
        <button id="copyShareBtn" class="primary-btn" type="button">复制</button>
        <button id="closeShareBtn" class="ghost-btn" type="button">关闭</button>
      </div>
    </div>
  </dialog>

  <script src="vocab.js?v=20260609-audiofix"></script>
  <script src="app.js?v=20260609-audiofix"></script>
</body>
</html>
